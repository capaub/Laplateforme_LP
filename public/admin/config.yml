backend:
  name: github
  repo: capaub/Laplateforme_LP
  branch: main
  base_url: https://sveltia-cms-auth.aubry-capitone.workers.dev

media_folder: public/images
public_folder: /images

site_url: https://capaub.github.io/Laplateforme_LP

collections:
  - name: site
    label: "Contenu du site"
    files:

      - name: content
        label: "Landing page"
        file: content/site.json
        format: json
        fields:
          - name: theme
            label: "Charte graphique"
            widget: object
            fields:
              - { name: primary, label: "Couleur principale (boutons, liens)", widget: color }
              - { name: primaryHover, label: "Couleur au survol", widget: color }
              - { name: text, label: "Couleur du texte", widget: color }
              - { name: textMuted, label: "Couleur du texte \"mué\"", widget: color }
              - { name: background, label: "Couleur de fond", widget: color }
              - { name: surface, label: "couleur de surface", widget: color }
          - name: seo
            label: "Référencement (SEO)"
            widget: object
            fields:
              - name: title
              - label: "Titre dans Google"
              - widget: string
              - hint: "50 à 60 caractères. Incluez votre activité et votre ville."
              - name: description
              - label: "Description dans Google"
              - widget: text
              - hint: "150 à 160 caractères. Une phrase qui donne envie de cliquer."
          - { name: name, label: "Nom du site", widget: string }
          - { name: tagLine, label: "Slogan", widget: string }
          - { name: description, label: "Description (SEO)", widget: text }

          - name: hero
            label: "Section Hero"
            widget: object
            fields:
              - { name: title, label: "Titre principal", widget: string }
              - { name: subtitle, label: "Sous-titre", widget: text }
              - { name: ctaLabel, label: "Texte du bouton", widget: string }

          - name: problem
            label: "Section Problème"
            widget: object
            fields:
              - { name: title, label: "Titre", widget: string }
              - name: items
                label: "Points de douleur"
                widget: list
                min: 3
                max: 3
                field: { name: item, label: "Point", widget: string }

          - name: solution
            label: "Section Solution"
            widget: object
            fields:
              - { name: title, label: "Titre", widget: string }
              - name: benefits
                label: "Bénéfices"
                widget: list
                min: 3
                max: 3
                field: { name: benefit, label: "Bénéfice", widget: string }

          - name: socialProof
            label: "Témoignages"
            widget: object
            fields:
              - { name: title, label: "Titre", widget: string }
              - name: testimonials
                label: "Témoignages"
                widget: list
                min: 3
                max: 3
                fields:
                  - { name: quote, label: "Citation", widget: text }
                  - { name: author, label: "Auteur", widget: string }
                  - { name: role, label: "Activité", widget: string }

          - name: cta
            label: "Section Contact"
            widget: object
            fields:
              - { name: title, label: "Titre", widget: string }
              - { name: intro, label: "Texte d'introduction", widget: text }

          - name: footer
            label: "Pied de page"
            widget: object
            fields:
              - { name: companyName, label: "Nom de l'entreprise", widget: string }
              - { name: email, label: "Email de contact", widget: string }
              - { name: phone, label: "Téléphone de contact", widget: string }